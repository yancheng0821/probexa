services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: probexa
      POSTGRES_PASSWORD: probexa
      POSTGRES_DB: probexa
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"

volumes:
  pgdata:
